<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Will You Forgive Me?</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}html{scroll-behavior:smooth}body{min-height:100vh;padding:30px 15px;display:flex;justify-content:center;align-items:flex-start;overflow-x:hidden;overflow-y:auto;background:linear-gradient(135deg,#ffd6e7,#fff3f7,#ffe8f0)}.card{width:100%;max-width:700px;margin:20px auto;padding:50px 30px;background:rgba(255,255,255,.25);backdrop-filter:blur(18px);border-radius:30px;box-shadow:0 15px 50px rgba(0,0,0,.15);text-align:center}h1{font-family:"Great Vibes",cursive;font-size:70px;color:#ff3f7f;margin-bottom:20px}p{font-size:22px;color:#555;line-height:1.7;margin-bottom:35px}.buttons{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}button{border:none;border-radius:50px;padding:18px 45px;font-size:22px;font-weight:bold;cursor:pointer;transition:.3s}#yes{background:#ff4d88;color:#fff}#no{background:#fff;color:#ff4d88}#result{display:none;margin-top:35px;font-size:34px;font-family:"Great Vibes";color:#d6336c}@media(max-width:768px){h1{font-size:52px}p{font-size:18px}.buttons{flex-direction:column}button{width:100%;font-size:18px}}</style></head><body><div class="card"><h1>Will You Forgive Me?</h1><p>No matter what happens, you'll always be special to me.</p><div class="buttons"><button id="yes" onclick="yesClick()">Yes ❤️</button><button id="no" onclick="growYes()">No 💔</button></div><div id="result">Thank You ❤️<br>I Promise To Love You Better Every Day 🌹</div></div><script>let c=0,s=22,p=45;function growYes(){c++;let y=document.getElementById("yes"),n=document.getElementById("no");s+=6;p+=10;y.style.fontSize=s+"px";y.style.padding="18px "+p+"px";n.style.transform=`translate(${Math.random()*160-80}px,${Math.random()*120-60}px)`;if(c>=6){n.style.display="none";y.style.width="100%";y.style.fontSize="36px";y.style.padding="24px";}}function yesClick(){document.getElementById("result").style.display="block";}</script></body></html>
