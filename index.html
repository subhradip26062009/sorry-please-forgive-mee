*{

html{

body{

    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* Floating Hearts */

.hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
    z-index:-1;
}

.hearts span{
    position:absolute;
    bottom:-50px;
    color:rgba(255,255,255,.7);
    font-size:25px;
    animation:float linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

/* Card */

.card{
    width:100%;
    max-width:800px;

    margin:20px auto;

    padding:60px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.3);

    border-radius:30px;

    box-shadow:0 20px 60px rgba(0,0,0,.15);

    text-align:center;

    animation:fade 1.5s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.small{
    color:white;
    letter-spacing:4px;
    font-size:15px;
    margin-bottom:20px;
}

h1{
    font-family:"Great Vibes",cursive;
    font-size:80px;
    color:white;
    text-shadow:0 5px 15px rgba(0,0,0,.2);
    margin-bottom:25px;
}

p{
    font-size:22px;
    line-height:1.8;
    color:white;
    margin-bottom:40px;
}

button{
    padding:18px 50px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f87;
    cursor:pointer;
    font-weight:600;
    transition:.35s;
}

button:hover{
    transform:scale(1.08);
    background:#ff4f87;
    color:white;
}

.signature{
    margin-top:40px;
    color:white;
    opacity:.8;
}

/* Mobile */

@media(max-width:768px){

}
